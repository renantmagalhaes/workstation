# Monitors Configuration
# Documentation: https://github.com/FT-Labs/mango/blob/master/docs/configuration/monitors.md
#
# Best Practices:
# - Always arrange monitors starting from 0,0 and extend into positive coordinates.
# - Never use negative coordinates for monitor positions (XWayland bug).
# - Use ^ and $ for exact name matching (e.g. ^eDP-1$).
# - Use wlr-randr to get your monitor's name, make, model, and serial.

# Monitor 1 (Primary) - DisplayPort (DP-1, DisplayPort-1, etc.)
monitorrule=name:^(DP|DisplayPort).*$,width:2560,height:1440,refresh:120,x:0,y:0

# Monitor 2 (Secondary) - HDMI (HDMI-A-1, HDMI-1, etc.)
# Placed to the right of Monitor 1 (x: 2560)
monitorrule=name:^HDMI.*$,width:2560,height:1440,refresh:120,x:2560,y:0
