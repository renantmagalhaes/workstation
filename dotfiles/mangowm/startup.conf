# =============================================================================
# MangoWM Autostart Configuration
# =============================================================================

# --- System & Authentication ---
# Authentication Agent for Polkit
exec-once=/usr/libexec/polkit-mate-authentication-agent-1

# Start keyd service for keyboard mapping/remapping
exec-once=sudo systemctl start keyd.service


# --- Desktop Environment & UI Components ---
# Main Waybar status bar panel
exec-once=waybar -c ~/.dotfiles/mangowm/waybar/config.jsonc -s ~/.dotfiles/mangowm/waybar/style.css
# exec-once=waybar -c ~/.dotfiles/mangowm/waybar/config-for-catppuccin.jsonc -s ~/.dotfiles/mangowm/waybar/style-for-catppuccin.css

# Secondary Waybar panel for trigger/hotspots configurations
exec-once=waybar -c ~/.dotfiles/mangowm/waybar/trigger_config.jsonc -s ~/.dotfiles/mangowm/waybar/trigger_style.css

# Wallpaper daemon (Awww)
exec-once=awww-daemon

# Mako notification daemon
exec-once=mako


# --- Keyboard, Mouse & Clipboard Utilities ---
# Custom mouse actions handling script
exec-once=~/.dotfiles/mangowm/scripts/mouse_actions.py

# Custom top-left hotarea watcher script (triggers toggle_all_overviews.sh)
exec-once=~/.dotfiles/mangowm/scripts/hotarea_watcher.py

# Waybar status/scroll indicator watcher script
# exec-once=~/.dotfiles/mangowm/waybar/scripts/waybar_indicator_watcher.sh

# Clipboard manager (Cliphist) - Monitor and store text copies
exec-once=wl-paste --type text --watch cliphist store

# Clipboard manager (Cliphist) - Monitor and store image copies
exec-once=wl-paste --type image --watch cliphist store


# --- Connectivity & Network ---
# Network Manager applet
exec-once=nm-applet

# KDE Connect daemon and system tray indicator
exec-once=kdeconnectd
exec-once=kdeconnect-indicator


# --- Security & Applications ---
# 1Password password manager - Start minimized in background
exec-once=/usr/bin/1password --silent


# --- Maintenance & Workarounds ---
# Remove Vivaldi singleton lock files to prevent startup warnings/failures
exec-once=rm -rf ~/.config/vivaldi/Singleton*


# --- Commented / Disabled Startup Items ---
# exec-once=hypridle
# exec-once=~/.config/hypr/scripts/launch-kitty-magic.sh
# Service watchdog (restart crashed processes)
exec-once=~/.dotfiles/mangowm/scripts/watchdog.sh
# exec-once=~/.QS-Launcher/spotlight
