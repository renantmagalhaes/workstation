# Window Manager Behavior & Miscellaneous settings

# Overview Setting
hotarea_size=10        # Pixels for hotarea detection (e.g. top-left corner)
enable_hotarea=1       # Trigger overview mode via mouse corner
ov_tab_mode=0          # Tab switching behavior in overview
overviewgappi=5        # Inner gap size (pixels) between windows in overview
overviewgappo=30       # Outer gap size (pixels) between windows and screen edges

# Window Manager Behavior
no_border_when_single=0         # Remove borders when only one window is visible (1=yes)
axis_bind_apply_timeout=100     # Timeout (ms) for scroll event key bindings
focus_on_activate=1             # Focus windows when they request activation
idleinhibit_ignore_visible=0    # Allow background apps to inhibit sleep
sloppyfocus=1                   # Focus follows the mouse cursor
warpcursor=1                    # Center mouse cursor on window when focus shifts via keyboard
focus_cross_monitor=0           # Allow focus to jump to another monitor using directional keys
focus_cross_tag=0               # Allow focus to jump into other tags
enable_floating_snap=0          # Snap floating windows to other windows/edges
snap_distance=30                # Pixels needed to trigger window snapping
cursor_size=24                  # Pointer size
drag_tile_to_tile=1             # Drag tiled window onto another to stack/swap

# Scratchpad Settings
scratchpad_cross_monitor=1      # Pool scratchpads across all monitors (1=yes)
scratchpad_width_ratio=0.9      # Width of scratchpad relative to monitor (0.0 - 1.0)
scratchpad_height_ratio=0.9     # Height of scratchpad relative to monitor (0.0 - 1.0)
