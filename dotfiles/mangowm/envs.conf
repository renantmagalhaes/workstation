# Cursor settings
env=XCURSOR_SIZE,24
env=HYPRCURSOR_SIZE,24
env=XCURSOR_THEME,Breeze_Light
env=HYPRCURSOR_THEME,Breeze_Light

# Wayland forcing
env=GDK_BACKEND,wayland,x11,*
env=QT_QPA_PLATFORM,wayland;xcb
env=QT_STYLE_OVERRIDE,kvantum
env=SDL_VIDEODRIVER,wayland
env=MOZ_ENABLE_WAYLAND,1
env=OZONE_PLATFORM,wayland
env=XDG_SESSION_TYPE,wayland

# Desktop identity
env=XDG_CURRENT_DESKTOP,MangoWM
env=XDG_SESSION_DESKTOP,MangoWM

# Electron compatibility
env=ELECTRON_OZONE_PLATFORM_HINT,auto

# Global dark mode
env=GTK_THEME,Graphite-Dark
env=GTK_APPLICATION_PREFER_DARK_THEME,1
env=QT_QPA_PLATFORMTHEME,Kvantum
