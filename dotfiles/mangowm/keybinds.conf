# Key Bindings

# reload config
bind=SUPER,r,reload_config

# Exit and kill
bind=SUPER+ALT,Escape,quit
bind=SUPER,Q,killclient

# Applications
bind=CTRL+ALT,T,spawn,kitty
bind=CTRL+SHIFT,space,spawn,1password --quick-access
bind=SUPER,E,spawn,nautilus
#bindr=Super,Super_L,spawn,~/.QS-Launcher/spotlight
bind=ALT,space,spawn,~/.config/rofi/scripts/rofi-menu.sh

# Screen lock and quick actions
bind=SUPER,L,spawn,~/.dotfiles/hyprland/hypr/scripts/lock.sh
bind=NONE,Print,spawn,flameshot gui

# Clipboard
bind=SUPER,V,spawn_shell,~/.config/hypr/scripts/cliphist-rofi-img | rofi -dmenu -show-icons -theme ~/.config/rofi/cliphist.rasi -matching fuzzy -i | awk '{print $1}' | xargs -r ~/.config/hypr/scripts/cliphist-rofi-img
bind=ALT,V,spawn_shell,~/.config/hypr/scripts/cliphist-rofi-img | rofi -dmenu -show-icons -theme ~/.config/rofi/cliphist.rasi -matching fuzzy -i | awk '{print $1}' | xargs -r ~/.config/hypr/scripts/cliphist-rofi-img

# Window management
bind=SUPER,M,togglemaximizescreen
bind=SUPER+SHIFT,M,togglefullscreen
bind=SUPER,T,togglefloating
bind=SUPER,Tab,spawn_shell,/home/rtm/GIT-REPOS/workstation/dotfiles/mangowm/scripts/toggle_overview.sh

bind=ALT,Tab,spawn_shell,/home/rtm/GIT-REPOS/workstation/dotfiles/mangowm/scripts/focus_other_monitor.sh

# Focus movement
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Mouse scrolling through windows (ALT or SHIFT + mouse wheel/axis)
axisbind=ALT,UP,focusstack,prev
axisbind=ALT,DOWN,focusstack,next
axisbind=SHIFT,UP,focusstack,prev
axisbind=SHIFT,DOWN,focusstack,next

# Window moving/swapping
bind=SUPER,period,exchange_client,right
bind=SUPER,comma,exchange_client,left
bind=SUPER+SHIFT,period,exchange_client,right
bind=SUPER+SHIFT,comma,exchange_client,left

# Layout fitting/resizing (Scroller specific)
bind=SUPER,F,set_proportion,1.0
bind=SUPER,R,switch_proportion_preset

# Terminal controls
bind=CTRL,Return,spawn,~/.config/hypr/scripts/toggle_or_spawn_special_kitty.sh
bind=CTRL+SHIFT,Return,spawn,kitty
bind=SUPER,Return,spawn_shell,/home/rtm/GIT-REPOS/workstation/dotfiles/mangowm/scripts/move_to_other_monitor.sh

# Workspace Navigation (Dual Monitor fallback)
bind=SUPER,1,view,1,1
bind=SUPER,2,view,2,1
bind=SUPER,3,view,3,1
bind=SUPER,4,view,4,1
bind=SUPER,5,view,5,1

# Cycle workspaces/tags
bind=SUPER+CTRL,Left,spawn_shell,/home/rtm/GIT-REPOS/workstation/dotfiles/mangowm/scripts/change_workspace.sh left
bind=SUPER+CTRL,Right,spawn_shell,/home/rtm/GIT-REPOS/workstation/dotfiles/mangowm/scripts/change_workspace.sh right

# Move window to workspace
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0

# Media playback controls
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=SUPER,C,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioMute,spawn,playerctl play-pause

# Volume adjustments
bind=NONE,XF86AudioRaiseVolume,spawn,~/.dotfiles/hyprland/hypr/scripts/volnotify.sh +5
bind=NONE,XF86AudioLowerVolume,spawn,~/.dotfiles/hyprland/hypr/scripts/volnotify.sh -5

# Mouse gestures/bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Overview mode bindings
keymode=overview
bind=NONE,Tab,focusstack,next
bind=NONE,Escape,spawn_shell,/home/rtm/GIT-REPOS/workstation/dotfiles/mangowm/scripts/toggle_overview.sh
bind=SUPER,Tab,spawn_shell,/home/rtm/GIT-REPOS/workstation/dotfiles/mangowm/scripts/toggle_overview.sh
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

keymode=default
