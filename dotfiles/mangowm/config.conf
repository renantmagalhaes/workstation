# Main MangoWM configuration file
# This file sources all other configuration files

# Source monitors configuration
source=./monitors.conf

# Source windows rules
source=./windows-rules.conf

# Source environment variables
source=./envs.conf

# Source input configurations (keyboard, mouse, trackpad)
source=./inputs.conf

# Source layout configurations and tagrules
source=./layouts.conf

# Source window manager behavior and misc settings
source=./behavior.conf

# Source theme, appearance, and animations
source=./theme.conf

# Source startup applications
source=./startup.conf

# Source keybindings
source=./keybinds.conf

