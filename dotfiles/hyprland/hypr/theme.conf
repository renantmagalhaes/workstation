####################
### GENERAL SETTINGS ###
####################

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # Window gaps
    gaps_in = 5
    gaps_out = 15

    # Border settings
    border_size = 2
    col.inactive_border = rgba(100,100,100,1)
    # col.active_border = rgba(255,255,255,1) # white
    # col.active_border = rgba(64,156,255,1) # vibrant blue
    # col.active_border = rgba(100,180,255,1) # soft sky blue
    col.active_border = rgba(120,255,180,1) # minty soft green
    # col.active_border = rgba(0,200,100,1)   # neon emerald
    # col.active_border = rgba(33,246,137,1) # turf green
    # col.active_border = rgba(255,150,255,1) # soft pastel magenta
    # col.active_border = rgba(255,85,200,1)  # balanced hot pink
    # col.active_border = rgba(220,0,150,1)   # vivid neon magenta
    # col.active_border = rgba(180,140,255,1) # soft lavender
    # col.active_border = rgba(140,80,255,1)  # balanced royal purple
    # col.active_border = rgba(110,0,255,1)   # vivid electric violet
    # col.active_border = rgba(255,240,150,1) # soft pastel yellow
    # col.active_border = rgba(255,220,80,1)  # balanced golden yellow
    # col.active_border = rgba(255,200,0,1)   # vivid amber yellow
    # col.active_border = rgba(255,180,120,1) # soft apricot
    # col.active_border = rgba(255,140,50,1)  # balanced orange
    # col.active_border = rgba(255,90,0,1)    # vivid deep orange
    # col.active_border = rgba(255,130,130,1) # soft coral red
    # col.active_border = rgba(255,70,70,1)   # balanced vivid red
    # col.active_border = rgba(200,0,0,1)     # deep crimson
    # col.active_border = rgba(100,255,255,1) # soft cyan glow
    # col.active_border = rgba(0,200,200,1)   # balanced teal
    # col.active_border = rgba(0,150,180,1)   # deep ocean teal
    # col.active_border = rgba(200,200,200,1) # light silver
    # col.active_border = rgba(150,150,150,1) # medium gray
    # col.active_border = rgba(90,90,90,1)    # graphite gray

    # Window behavior
    resize_on_border = true
    allow_tearing = false

    # Layout
    layout = dwindle
}

####################
### CURSOR SETTINGS ###
####################

# Enable hardware cursors (standard for AMD)
cursor {
    no_hardware_cursors = false
}

