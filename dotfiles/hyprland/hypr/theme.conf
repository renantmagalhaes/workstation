# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    dim_special = 0.2
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
    }

    blur {
        enabled = true
        size = 6            # 3 / 8 stronger blur radius
        passes = 3          # 1  / 2 smoother result without heavy cost
        new_optimizations = true
        ignore_opacity = true
        xray = false

        # tasteful pop with minimal banding
        noise = 0.02
        contrast = 1.6
        brightness = 1
        vibrancy = 0.4
        vibrancy_darkness = 0.4

        # optional, nice for context menus
        popups = true
        popups_ignorealpha = 0.20
        new_optimizations = true


        # blur behind special workspace if you want it
        special = true
    }
}

####################
### ANIMATIONS ###
####################

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Bezier curves
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    
    # Custom KDE-style curves
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = reap, 0.05, 0.9, 0.1, 1.1

    # Animation definitions
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
        
    # KDE Style - Bouncy and Magic Lamp effect
    animation = windowsIn, 1, 10, overshot, popin 5%
    animation = windowsOut, 1, 10, reap, popin 5%
    animation = fadeIn, 1, 3, almostLinear
    animation = fadeOut, 1, 5, almostLinear
    animation = fade, 1, 5, almostLinear
    animation = layers, 1, 4, easeOutQuint
    animation = layersIn, 1, 2, easeOutQuint, fade
    animation = layersOut, 1, 2, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    
    # KDE Style - Smooth Slide (No Bounce)
    animation = workspaces, 1, 5, easeOutQuint, slide
    animation = workspacesIn, 1, 5, easeOutQuint, slide
    animation = workspacesOut, 1, 5, easeOutQuint, slide

    # Special workspace animation
    animation = specialWorkspace, 1, 5, easeOutQuint, slidefadevert -50%
}

