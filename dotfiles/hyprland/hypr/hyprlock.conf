#######################
### HYPRLOCK CONFIG ###
#######################

# Built around the dynamic screenshot + overlay pipeline from lock.sh:
# the lock UI stays clean and glassy so the animated layer remains visible.

####################
### THEME SETTINGS ###
####################

source = $HOME/.dotfiles/hyprland/hypr/hyprlock/mocha.conf

$accent = $sky
$accent_alt = $teal
$font = JetBrainsMono Nerd Font
$lock_accent_border = rgba(137, 220, 235, 0.30)
$lock_accent_ring = rgba(137, 220, 235, 0.16)
$lock_accent_focus = rgba(137, 220, 235, 0.85)

####################
### GENERAL SETTINGS ###
####################

general {
    hide_cursor = true
}

####################
### FALLBACK BACKGROUND ###
####################

# Dynamic per-monitor backgrounds are injected by lock.sh.
# This block only matters if the script fails and hyprlock falls back to this file directly.
background {
    monitor =
    path = /home/rtm/.config/hypr/images/blackhole.jpg
    blur_passes = 1
    blur_size = 7
    noise = 0.014
    contrast = 0.95
    brightness = 0.88
    vibrancy = 0.20
    color = $base
}

####################
### GLASS PANEL ###
####################

shape {
    monitor =
    size = 500, 340
    position = 0, 0
    halign = center
    valign = center
    color = rgba(17, 17, 27, 0.48)
    rounding = 28
    border_size = 2
    border_color = $lock_accent_border
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.35)
}

shape {
    monitor =
    size = 500, 340
    position = 0, 0
    halign = center
    valign = center
    color = rgba(0, 0, 0, 0.00)
    rounding = 28
    border_size = 1
    border_color = rgba(255, 255, 255, 0.06)
}

shape {
    monitor =
    size = 400, 1
    position = 0, -4
    halign = center
    valign = center
    color = rgba(186, 194, 222, 0.12)
}

####################
### TIME AND DATE ###
####################

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = $subtext0
    font_size = 20
    font_family = $font
    position = 0, 135
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $text
    font_size = 78
    font_family = $font
    position = 0, 61
    halign = center
    valign = center
}

####################
### INPUT PANEL ###
####################

label {
    monitor =
    text = cmd[update:60000] echo "$USER"
    color = $subtext1
    font_size = 18
    font_family = $font
    position = 0, -38
    halign = center
    valign = center
}

shape {
    monitor =
    size = 360, 70
    position = 0, -107
    halign = center
    valign = center
    color = rgba(49, 50, 68, 0.55)
    rounding = 22
    border_size = 1
    border_color = $lock_accent_ring
}

input-field {
    monitor =
    size = 360, 70
    position = 0, -107
    halign = center
    valign = center
    outline_thickness = 3
    rounding = 22
    fade_on_empty = false
    dots_center = true
    dots_size = 0.18
    dots_spacing = 0.28
    hide_input = false
    inner_color = rgba(0, 0, 0, 0.00)
    outer_color = $lock_accent_focus
    check_color = $accent_alt
    fail_color = $red
    capslock_color = $yellow
    font_color = $text
    placeholder_text = <span foreground="##$subtext0Alpha">Password</span>
    fail_text = <span foreground="##$redAlpha">$FAIL</span> <span foreground="##$subtext0Alpha">($ATTEMPTS attempts)</span>
}
