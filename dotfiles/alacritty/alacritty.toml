[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#1A1A1A"
foreground = "#F1F1F1"

[colors.cursor]
cursor = "#ffffff"
text = "#1d1f21"

[colors.normal]
black = "#121212"
blue = "#2B4FFF"
cyan = "#28B9FF"
green = "#13F452"
magenta = "#2883FF"
red = "#A52AFF"
white = "#F1F1F1"
yellow = "#3D2AFF"

[colors.bright]
black = "#666666"
blue = "#5C78FF"
cyan = "#5AC8FF"
green = "#A69BFF"
magenta = "#5EA2FF"
red = "#8A43BD"
white = "#FFFFFF"
yellow = "#3D2AFF"

[env]
TERM = "xterm-256color"

[font]
size = 12.0

[font.normal]
family = "MapleMono NF"
style = "Regular"

[font.bold]
family = "MapleMono NF"
style = "Bold"

[font.italic]
family = "MapleMono NF"
style = "Italic"

[font.bold_italic]
family = "MapleMono NF"
style = "Bold Italic"

[font.offset]
x = 0
y = 1

[window]
opacity = 0.92
decorations = "none"
dynamic_padding = false
title = "Alacritty"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[scrolling]
history = 50000

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "PasteSelection"
key = "Insert"
mods = "Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Plus"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"
mods = "None"

[[keyboard.bindings]]
action = "Paste"
key = "Paste"
mods = "None"

[[keyboard.bindings]]
action = "Copy"
key = "Copy"
mods = "None"

[[keyboard.bindings]]
action = "ClearLogNotice"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "\f"
key = "L"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollToTop"
key = "Home"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollToBottom"
key = "End"
mode = "~Alt"
mods = "Shift"
